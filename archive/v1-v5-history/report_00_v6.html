<!-- L0.4 Chart.js 全局对象（必须在 window 上） -->
<script>
// ✅ 关键：必须挂载到 window，而不是 IIFE 局部作用域
(function() {
  function renderAll() {
    console.log('P16Charts.renderAll() 被调用');
    
    // 查找所有 chart-container
    document.querySelectorAll('.chart-container').forEach(function(container) {
      const type = container.getAttribute('data-chart-type');
      const dataStr = container.getAttribute('data-chart-data');
      
      if (!type || !dataStr) return;
      
      // 如果已经有 canvas，跳过
      if (container.querySelector('canvas')) return;
      
      try {
        const data = JSON.parse(dataStr);
        
        // 创建 canvas
        const canvas = document.createElement('canvas');
        container.appendChild(canvas);
        
        // Chart.js 类型映射
        const chartType = type.replace('chartjs-', '');
        
        // 创建图表
        new Chart(canvas, {
          type: chartType,
          data: {
            labels: data.labels || [],
            datasets: [{
              label: data.note || '',
              data: data.values || [],
              backgroundColor: [
                'rgba(30, 64, 175, 0.7)',
                'rgba(37, 99, 235, 0.7)',
                'rgba(59, 130, 246, 0.7)',
                'rgba(96, 165, 250, 0.7)',
                'rgba(147, 197, 253, 0.7)',
                'rgba(191, 219, 254, 0.7)'
              ],
              borderColor: '#1e40af',
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'bottom',
                labels: { font: { family: 'FangSong', size: 14 } }
              }
            }
          }
        });
        
        console.log('渲染成功: ' + type);
      } catch (e) {
        console.error('渲染失败: ' + type, e);
      }
    });
  }
  
  function renderOne(containerId) {
    const container = document.getElementById(containerId);
    if (container) {
      // 单个渲染逻辑
    }
  }
  
  // ✅ 关键：挂载到 window 全局对象
  window.P16Charts = {
    renderAll: renderAll,
    renderOne: renderOne
  };
  
  console.log('window.P16Charts 已挂载');
})();

// 页面加载后自动渲染
document.addEventListener('DOMContentLoaded', function() {
  console.log('DOMContentLoaded 触发');
  if (window.P16Charts && window.P16Charts.renderAll) {
    window.P16Charts.renderAll();
  }
});
</script>
